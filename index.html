<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LITEVISUALS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #09090e; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            padding: 0 16px 30px;
        }

        /* ХЕДЕР (Из скриншота 1000120672.jpg) */
        .top-nav {
            width: 100%;
            max-width: 420px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111116;
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 6px;
            border-radius: 16px;
            margin: 24px 0 40px 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            color: #4e4e5e;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 12px;
        }

        .nav-item svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Активная вкладка "Сообщество" */
        .nav-item.active {
            color: #ffffff;
            background: #161622;
            border: 1px solid rgba(91, 87, 239, 0.2);
            position: relative;
        }
        
        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 15%;
            width: 70%;
            height: 2px;
            background: #5b57ef;
            box-shadow: 0 0 8px #5b57ef;
            border-radius: 2px;
        }

        /* КАРТОЧКА ФОРМЫ (Из скриншота 1000120668.jpg) */
        .main-card {
            width: 100%;
            max-width: 380px;
            background: #111116;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .banner {
            width: 100%;
            height: 150px;
            background: linear-gradient(rgba(0,0,0,0.1), #111116), url('https://raw.githubusercontent.com/litevisuals/visuals/main/banner.jpg') center/cover no-repeat;
            background-color: #161622;
            display: flex;
            align-items: flex-end;
            padding: 24px 20px;
        }

        .banner-text {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.4;
            color: #e2e2e8;
        }

        .form-content { padding: 24px 20px 30px; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .form-title { font-size: 22px; font-weight: 700; }
        .close-btn { color: #4e4e5e; cursor: pointer; font-size: 18px; }

        .input-group { position: relative; margin-bottom: 14px; }
        .input-group input {
            width: 100%;
            background: #17171f;
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            padding: 18px 45px 18px 18px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        .input-group input:focus { border-color: #5b57ef; background: #1a1a26; }
        
        /* ЖЕСТКИЙ ФИКС ЖЕЛТОГО ФОНА ИНПУТОВ */
        .input-group input:-webkit-autofill,
        .input-group input:-webkit-autofill:hover, 
        .input-group input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 1000px #17171f inset !important;
            -webkit-text-fill-color: #ffffff !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .eye-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: #4e4e5e; cursor: pointer; font-size: 16px; }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #5b57ef 0%, #3b37c7 100%);
            color: #ffffff;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(91, 87, 239, 0.25);
            transition: all 0.15s;
            margin-top: 10px;
            margin-bottom: 20px;
        }
        .btn-submit:active { transform: scale(0.98); opacity: 0.95; }

        .footer-links { display: flex; justify-content: space-between; font-size: 13px; }
        .link-secondary { color: #525266; text-decoration: none; cursor: pointer; }
        .link-secondary span { color: #fff; font-weight: 500; }

        /* ОКНО ПОСЛЕ УСПЕШНОГО ВХОДА */
        #client-area { display: none; padding: 30px 20px; text-align: center; }
        .welcome-text { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
        .user-email { font-size: 13px; color: #525266; margin-bottom: 30px; font-family: monospace; }

        #toast { 
            position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); 
            background: #fff; color: #000; padding: 14px 28px; border-radius: 50px; 
            font-size: 13px; font-weight: 700; opacity: 0; z-index: 1000;
            transition: all 0.3s cubic-bezier(0.1, 1, 0.1, 1); pointer-events: none; 
        }
        #toast.show { bottom: 30px; opacity: 1; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
            Аккаунт
        </div>
        <div class="nav-item active">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.53c-.26-.81-1-1.4-1.9-1.4h-1v-3c0-.55-.45-1-1-1h-6v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
            Сообщество
        </div>
        <div class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            Баланс
        </div>
    </div>

    <div class="main-card">
        <div class="banner">
            <div class="banner-text">Сделайте каждую игровую сессию по-настоящему комфортной с нашим продуктом</div>
        </div>

        <div id="auth-area" class="form-content">
            <div class="header-row">
                <div class="form-title" id="form-title">Авторизация</div>
                <div class="close-btn">✕</div>
            </div>

            <div class="input-group">
                <input type="email" id="email" placeholder="Войди, чтобы попасть в свой профиль">
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="Пароль">
                <span class="eye-icon" onclick="togglePassword()">👁</span>
            </div>

            <button class="btn-submit" id="submit-btn" onclick="handleAuth()">Войти</button>

            <div class="footer-links">
                <div class="link-secondary" id="switch-btn" onclick="toggleMode()">Нет аккаунта? <span>Регистрация</span></div>
                <div class="link-secondary">Забыл пароль</div>
            </div>
        </div>

        <div id="client-area">
            <div class="welcome-text">Доступ получен</div>
            <div class="user-email" id="user-display-email">...</div>
            
            <button class="btn-submit" onclick="copyScript()">Скопировать скрипт</button>
            <button class="btn-submit" style="background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); margin-top:0; color:#62627a;" onclick="logout()">Выйти из профиля</button>
        </div>
    </div>

    <div id="toast">Готово</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Твои данные подключения (URL взят с твоего скрина 1000120660.jpg)
        const SUPABASE_URL = "https://ycvvuszmrydfuyuaavpk.supabase.co";
        // Сюда вставь скопированный Ключ для публикации (anon public) из скрина 1783066045309.jpeg
        const SUPABASE_ANON_KEY = "СЮДА_ВСТАВЬ_КЛЮЧ_ИЗ_НАСТРОЕК"; 

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let isLoginMode = true;

        window.onload = async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) { showCabinet(session.user.email); }
        };

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('form-title').innerText = isLoginMode ? "Авторизация" : "Регистрация";
            document.getElementById('submit-btn').innerText = isLoginMode ? "Войти" : "Создать аккаунт";
            document.getElementById('switch-btn').innerHTML = isLoginMode ? "Нет аккаунта? <span>Регистрация</span>" : "Уже есть профиль? <span>Войти</span>";
        }

        function togglePassword() {
            const p = document.getElementById('password');
            p.type = p.type === "password" ? "text" : "password";
        }

        async function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if(!email || !password) return showToast("Заполните все поля");

            if(isLoginMode) {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if(error) showToast("Неверный логин или пароль");
                else showCabinet(data.user.email);
            } else {
                const { data, error } = await supabase.auth.signUp({ email, password });
                if(error) showToast(error.message);
                else showToast("Аккаунт создан! Подтвердите на почте.");
            }
        }

        function showCabinet(email) {
            document.getElementById('auth-area').style.display = 'none';
            document.getElementById('client-area').style.display = 'block';
            document.getElementById('user-display-email').innerText = email;
        }

        async function logout() {
            await supabase.auth.signOut();
            location.reload();
        }

        function copyScript() {
            if (navigator.vibrate) navigator.vibrate(15);
            const code = "loadstring(game:HttpGet('https://raw.githubusercontent.com/litevisuals/visuals/main/Lite_Pc.lua'))()";
            navigator.clipboard.writeText(code).then(() => { showToast("Скрипт скопирован!"); });
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2200);
        }
    </script>
</body>
</html>
