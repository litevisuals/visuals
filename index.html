<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { initializeFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDEaVk5ynHpi2uFu2d7Zqc3PAAPR58IeGI",
        authDomain: "database-2aad8.firebaseapp.com",
        projectId: "database-2aad8",
        storageBucket: "database-2aad8.firebasestorage.app",
        messagingSenderId: "1095120564272",
        appId: "1:1095120564272:web:eeefe80cb3816df52c3df5",
        measurementId: "G-49PRFBPGZ9"
    };

    const app = initializeApp(firebaseConfig);
    // Отключаем кэширование во избежание фантомных офлайн-сессий
    const db = initializeFirestore(app, { localCache: undefined });

    // Глобальные хэндлеры для интерфейса
    window.switchPage = function(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-bar .nav-btn').forEach(b => b.classList.remove('active'));
        const targetPage = document.getElementById(`page-${pageId}`);
        if(targetPage) targetPage.classList.add('active');
        if(event && event.currentTarget) event.currentTarget.classList.add('active');
    };

    window.switchShopTab = function(tabId) {
        document.querySelectorAll('.shop-tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.shop-pane').forEach(p => p.classList.remove('active'));
        if(event && event.currentTarget) event.currentTarget.classList.add('active');
        const targetPane = document.getElementById(`shop-${tabId}`);
        if(targetPane) targetPane.classList.add('active');
    };

    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        if (!container) return;
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        let icon = '🔔'; if (type === 'success') icon = '✅'; if (type === 'error') icon = '❌';
        toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3000);
    }

    // Состояние приложения
    let currentUser = localStorage.getItem('logged_user') || "";
    let balance = 10000, exp = 0, lastBonusTime = 0, customRank = -1;
    let usedPromos = [];
    let isBanned = false;
    let isInitialLoad = true; // Флаг для предотвращения зацикливания при чтении из БД

    let partsInventory = {
        cpu_low: 0, cpu_mid: 0, cpu_high: 0,
        gpu_low: 0, gpu_mid: 0, gpu_high: 0,
        cool_low: 0, cool_mid: 0, cool_high: 0,
        heat: 25, powerBill: 0, powerOn: true
    };

    let currentAsset = "pegasus";
    let assetsData = {
        pegasus: { price: 95, history: Array(20).fill(95), shares: 0, shortShares: 0, shortPrice: 0, trend: 0 },
        btc: { price: 65000, history: Array(20).fill(65000), shares: 0, shortShares: 0, shortPrice: 0, trend: 0 },
        eth: { price: 3400, history: Array(20).fill(3400), shares: 0, shortShares: 0, shortPrice: 0, trend: 0 },
        aapl: { price: 215, history: Array(20).fill(215), shares: 0, shortShares: 0, shortPrice: 0, trend: 0 },
        gold: { price: 2300, history: Array(20).fill(2300), shares: 0, shortShares: 0, shortPrice: 0, trend: 0 }
    };

    const ranks = ["Новичок", "Скальпер", "Инвестор", "Кит рынка", "Волк с Уолл-Стрит"];
    const canvasCtx = document.getElementById('marketChart').getContext('2d');
    let fillGradient = canvasCtx.createLinearGradient(0, 0, 0, 150);
    fillGradient.addColorStop(0, 'rgba(0, 230, 118, 0.15)');
    fillGradient.addColorStop(1, 'rgba(0, 230, 118, 0.0)');

    const chart = new Chart(canvasCtx, {
        type: 'line',
        data: { labels: Array(20).fill(''), datasets: [{ data: [...assetsData[currentAsset].history], borderColor: '#00e676', borderWidth: 2.5, pointRadius: 0, tension: 0.35, fill: true, backgroundColor: fillGradient }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { position: 'right', grid: { color: '#161824' }, ticks: { color: '#61667f', font: { size: 10 } } } }
    });

    // Изменение актива
    document.getElementById('assetSelect').addEventListener('change', (e) => {
        currentAsset = e.target.value;
        chart.data.datasets[0].data = [...assetsData[currentAsset].history];
        chart.update(); 
        updateUI();
    });

    // Логика авторизации / создания
    document.getElementById('btnAuth').addEventListener('click', async () => {
        let inputName = document.getElementById('authLogin').value.trim();
        let inputPass = document.getElementById('authPass').value.trim();
        if (inputName.length < 3 || inputPass.length < 3) { showToast("Данные слишком короткие!", "error"); return; }
        
        const userDocRef = doc(db, "users", inputName);
        try {
            const userDoc = await getDoc(userDocRef);

            if (userDoc.exists()) {
                let ud = userDoc.data();
                if (ud.isBanned === true) { 
                    document.getElementById('authScreen').style.display='none'; 
                    document.getElementById('banScreen').style.display='block'; 
                    return; 
                }
                if (ud.password === inputPass) { 
                    currentUser = inputName; 
                    localStorage.setItem('logged_user', currentUser); 
                    loadUserData(currentUser); 
                } else { 
                    showToast("Неверный пароль!", "error"); 
                }
            } else {
                // Создаем чистый профиль без конфликтов типов данных
                const initialData = { 
                    password: inputPass, 
                    balance: 10000, 
                    exp: 0, 
                    lastBonusTime: 0, 
                    usedPromos: [], 
                    partsInventory: partsInventory, 
                    customRank: -1, 
                    isBanned: false 
                };
                await setDoc(userDocRef, initialData);
                currentUser = inputName; 
                localStorage.setItem('logged_user', currentUser); 
                loadUserData(currentUser);
            }
        } catch(e) {
            showToast("Ошибка Firebase: " + e.message, "error");
        }
    });

    document.getElementById('btnLogout').addEventListener('click', () => { localStorage.removeItem('logged_user'); location.reload(); });

    // Подписка на базу данных
    function loadUserData(username) {
        isInitialLoad = true;
        onSnapshot(doc(db, "users", username), (snapshot) => {
            if (!snapshot.exists()) return;
            let d = snapshot.data();
            if (d.isBanned === true) { 
                document.getElementById('gameContainer').style.display='none'; 
                document.getElementById('banScreen').style.display='block'; 
                return; 
            }
            
            balance = d.balance ?? 10000;
            exp = d.exp ?? 0;
            lastBonusTime = d.lastBonusTime ?? 0;
            usedPromos = d.usedPromos ?? [];
            customRank = d.customRank ?? -1;
            
            if (d.partsInventory) {
                partsInventory = { ...partsInventory, ...d.partsInventory };
            }

            if (d.assets) {
                // Синхронизируем только количество акций, чтобы не ломать текущие графики
                for(let key in assetsData) {
                    if(d.assets[key]) {
                        assetsData[key].shares = d.assets[key].shares ?? 0;
                        assetsData[key].shortShares = d.assets[key].shortShares ?? 0;
                        assetsData[key].shortPrice = d.assets[key].shortPrice ?? 0;
                    }
                }
            }
            
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'block';
            document.getElementById('profile-name').innerText = username;
            if (username.toLowerCase() === "admin") document.getElementById('adminPanel').style.display = 'block';
            
            updateUI();
            isInitialLoad = false; // Разрешаем синхронизацию со стороны клиента после первой загрузки
        }, (error) => {
            console.error("Ошибка слушателя БД:", error);
        });
    }

    function getStats() {
        let lvl = Math.floor(Math.sqrt(exp / 120)) + 1;
        let rank = customRank !== -1 ? ranks[Math.min(customRank, ranks.length-1)] : ranks[Math.min(lvl - 1, ranks.length - 1)];
        
        let totalCoolingPower = 0.5 + (partsInventory.cool_low * 0.4) + (partsInventory.cool_mid * 1.5) + (partsInventory.cool_high * 7.0);
        let totalCPUs = partsInventory.cpu_low + partsInventory.cpu_mid + partsInventory.cpu_high;
        let totalGPUs = partsInventory.gpu_low + partsInventory.gpu_mid + partsInventory.gpu_high;
        let activeRigs = Math.min(totalCPUs, totalGPUs);
        
        let totalCpuPower = (partsInventory.cpu_low * 1.0) + (partsInventory.cpu_mid * 2.5) + (partsInventory.cpu_high * 6.0);
        let avgCpuMultiplier = totalCPUs > 0 ? (totalCpuPower / totalCPUs) : 1.0;

        let rawIncomeSec = (partsInventory.gpu_low * 15) + (partsInventory.gpu_mid * 75) + (partsInventory.gpu_high * 450);
        let eff = Math.max(10, 100 - Math.max(0, partsInventory.heat - 65) * 1.8); 
        
        let finalPassiveIncome = 0;
        if (partsInventory.powerOn && activeRigs > 0) {
            finalPassiveIncome = rawIncomeSec * avgCpuMultiplier * (eff / 100);
        }
        
        return { lvl, rank, passiveIncome: Math.floor(finalPassiveIncome), efficiency: Math.floor(eff), totalCoolingPower, activeRigs };
    }

    function updateUI() {
        let stats = getStats();
        let active = assetsData[currentAsset];

        document.getElementById('balance-t').innerText = '$' + balance.toFixed(2);
        document.getElementById('mining-bal').innerText = '$' + balance.toFixed(2);
        document.getElementById('shares').innerText = active.shares;
        document.getElementById('shortShares').innerText = active.shortShares;
        document.getElementById('playerLvl').innerText = stats.lvl;
        document.getElementById('playerRank').innerText = stats.rank;
        document.getElementById('profile-exp').innerText = exp;
        
        document.getElementById('mining-income').innerText = (partsInventory.powerOn && stats.activeRigs > 0 ? '+' : '❌ ') + `$${stats.passiveIncome}/с`;
        document.getElementById('mineHeat').innerText = `${partsInventory.heat.toFixed(1)}°C`;
        document.getElementById('mineEff').innerText = stats.efficiency;
        document.getElementById('minePower').innerText = `$${Math.floor(partsInventory.powerBill)}`;
        
        document.getElementById('activeRigsCount').innerText = stats.activeRigs;
        document.getElementById('rigsCoolingPower').innerText = `-${stats.totalCoolingPower.toFixed(1)}°C/с`;

        for (let key in partsInventory) {
            let el = document.getElementById(`inv-${key}`);
            if (el) el.innerText = partsInventory[key];
        }
    }

    window.partCosts = {
        cpu_low: 800, cpu_mid: 3200, cpu_high: 14000,
        gpu_low: 1200, gpu_mid: 5000, gpu_high: 26000,
        cool_low: 400, cool_mid: 2200, cool_high: 11500
    };

    window.tradePart = function(action, partId, customPrice) {
        let baseCost = window.partCosts[partId];
        if (action === 'buy') {
            if (balance >= baseCost) {
                balance -= baseCost;
                partsInventory[partId]++;
                exp += Math.floor(baseCost * 0.05);
                showToast("Компонент добавлен в пул сборок!", "success");
                updateUI(); syncOnline();
            } else { showToast("Недостаточно капитала!", "error"); }
        } else if (action === 'sell') {
            if (partsInventory[partId] > 0) {
                let sellRefund = Math.floor(baseCost * 0.75);
                balance += sellRefund;
                partsInventory[partId]--;
                showToast(`Компонент успешно продан за $${sellRefund}!`, "info");
                updateUI(); syncOnline();
            } else { showToast("У вас нет этой детали на продажу!", "error"); }
        }
    };

    document.getElementById('btnTap').addEventListener('click', () => { let stats = getStats(); balance += 5 + (stats.lvl * 2); exp += 5; updateUI(); syncOnline(); });
    
    document.getElementById('btnCoolDown').addEventListener('click', () => {
        if (balance >= 250) { balance -= 250; partsInventory.heat = 25; showToast("Фермы очищены и термопаста обновлена!", "success"); updateUI(); syncOnline(); }
        else { showToast("Не хватает денег на сервис!", "error"); }
    });
    
    document.getElementById('btnPayPower').addEventListener('click', () => {
        if (balance >= partsInventory.powerBill) { balance -= partsInventory.powerBill; partsInventory.powerBill = 0; partsInventory.powerOn = true; showToast("Энергосеть перезапущена!", "success"); updateUI(); syncOnline(); }
        else { showToast("Недостаточно денег для оплаты счетов электросети!", "error"); }
    });

    document.getElementById('btnMaxAmount').addEventListener('click', () => {
        let active = assetsData[currentAsset];
        let l = parseInt(document.getElementById('leverage').value);
        let maxBuy = Math.floor(balance / (active.price / l));
        document.getElementById('tradeAmount').value = maxBuy > 0 ? maxBuy : 1;
    });

    document.getElementById('btnBuy').addEventListener('click', () => {
        let qty = parseInt(document.getElementById('tradeAmount').value) || 1;
        let a = assetsData[currentAsset]; let l = parseInt(document.getElementById('leverage').value);
        let cost = (a.price / l) * qty;
        if (balance >= cost) { balance -= cost; a.shares += qty; exp += 15 * qty; showToast(`Куплено акций: ${qty}`, "success"); updateUI(); syncOnline(); } 
        else { showToast("Недостаточно средств!", "error"); }
    });

    document.getElementById('btnSell').addEventListener('click', () => {
        let qty = parseInt(document.getElementById('tradeAmount').value) || 1;
        let a = assetsData[currentAsset]; if (a.shares >= qty) {
            let l = parseInt(document.getElementById('leverage').value);
            balance += (a.price / l) * qty + ((a.price - (a.price / l)) * qty);
            a.shares -= qty; exp += 10 * qty; showToast(`Продано акций: ${qty}`, "success"); updateUI(); syncOnline();
        } else { showToast("У вас нет столько акций Лонг!", "error"); }
    });

    document.getElementById('btnShort').addEventListener('click', () => {
        let qty = parseInt(document.getElementById('tradeAmount').value) || 1;
        let a = assetsData[currentAsset]; let l = parseInt(document.getElementById('leverage').value);
        let cost = (a.price / l) * qty;
        if (balance >= cost) {
            if (a.shortShares === 0) a.shortPrice = a.price;
            balance -= cost; a.shortShares += qty; exp += 15 * qty; showToast(`Открыт Шорт на: ${qty}`, "success"); updateUI(); syncOnline();
        } else { showToast("Не хватает маржи!", "error"); }
    });

    document.getElementById('btnCover').addEventListener('click', () => {
        let qty = parseInt(document.getElementById('tradeAmount').value) || 1;
        let a = assetsData[currentAsset]; if (a.shortShares >= qty) {
            let l = parseInt(document.getElementById('leverage').value);
            balance += ((a.shortPrice / l) * qty) + ((a.shortPrice - a.price) * qty);
            a.shortShares -= qty; if (a.shortShares === 0) a.shortPrice = 0; exp += 10 * qty; showToast(`Выкуплен шорт: ${qty}`, "success"); updateUI(); syncOnline();
        } else { showToast("У вас нет такого объема шорт-позиции!", "error"); }
    });

    document.getElementById('btnDailyBonus').addEventListener('click', () => {
        let now = Date.now(); if (now - lastBonusTime < 24 * 60 * 60 * 1000) {
            let hr = Math.ceil(((24 * 60 * 60 * 1000) - (now - lastBonusTime)) / (1000 * 60 * 60));
            showToast(`Приходи через ${hr} ч.`, "error"); return;
        }
        let prize = Math.floor(Math.random() * 2500) + 500; balance += prize; lastBonusTime = now;
        showToast(`Акция сработала: +$${prize}!`, "success"); updateUI(); syncOnline();
    });

    document.getElementById('btnPromo').addEventListener('click', () => {
        let code = document.getElementById('promoInput').value.trim().toUpperCase();
        if (code === "LITE2026") {
            if (usedPromos.includes(code)) { showToast("Уже активирован!", "error"); return; }
            balance += 5000; usedPromos.push(code); showToast("Начислено +$5,000!", "success");
            document.getElementById('promoInput').value = ""; updateUI(); syncOnline();
        } else { showToast("Неверный промокод!", "error"); }
    });

    document.getElementById('btnOpenCase').addEventListener('click', () => {
        if (balance >= 2500) {
            balance -= 2500; let r = Math.random();
            if (r > 0.6) { let w = Math.floor(Math.random() * 5000) + 2500; balance += w; showToast(`💸 КУШ! Выпало: $${w}`, "success"); } 
            else { showToast("Кейс оказался пустым!", "error"); }
            updateUI(); syncOnline();
        }
    });

    async function execAdminCmd(cmdType) {
        let target = document.getElementById('admTargetUser').value.trim();
        let val = parseFloat(document.getElementById('admAmount').value) || 0;
        if (!target) { showToast("Укажите ник игрока цели!", "error"); return; }
        
        const ref = doc(db, "users", target);
        const snapshot = await getDoc(ref);
        if (!snapshot.exists()) { showToast("Игрок не найден!", "error"); return; }
        let tData = snapshot.data();

        if (cmdType === 'add') { tData.balance = (tData.balance || 0) + val; showToast(`Выдано $${val}`, "success"); }
        if (cmdType === 'take') { tData.balance = Math.max(0, (tData.balance || 0) - val); showToast(`Забрано $${val}`, "success"); }
        if (cmdType === 'lvl') { tData.exp = Math.pow(val - 1, 2) * 120 + 10; showToast(`Установлен уровень ${val}`, "success"); }
        if (cmdType === 'rank') { tData.customRank = Math.max(0, Math.min(4, parseInt(val))); showToast(`Ранг изменен`, "success"); }
        if (cmdType === 'ban') { tData.isBanned = !tData.isBanned; showToast(`Бан: ${tData.isBanned}`, "info"); }

        await setDoc(ref, tData, { merge: true });
        await setDoc(doc(db, "players", target), { balance: tData.balance, score: tData.balance.toFixed(2), lvl: Math.floor(Math.sqrt((tData.exp || 0) / 120)) + 1 }, { merge: true });
    }

    document.getElementById('admAddCash').addEventListener('click', () => execAdminCmd('add'));
    document.getElementById('admTakeCash').addEventListener('click', () => execAdminCmd('take'));
    document.getElementById('admSetLvl').addEventListener('click', () => execAdminCmd('lvl'));
    document.getElementById('admSetRank').addEventListener('click', () => execAdminCmd('rank'));
    document.getElementById('admBan').addEventListener('click', () => execAdminCmd('ban'));

    document.getElementById('btnPump').addEventListener('click', async () => { await setDoc(doc(db, "market", currentAsset), { action: "pump", time: Date.now() }); });
    document.getElementById('btnDump').addEventListener('click', async () => { await setDoc(doc(db, "market", currentAsset), { action: "dump", time: Date.now() }); });

    ['pegasus', 'btc', 'eth', 'aapl', 'gold'].forEach(assetKey => {
        onSnapshot(doc(db, "market", assetKey), (snapshot) => {
            if (snapshot.exists()) {
                let data = snapshot.data();
                if (data.action === "pump") { assetsData[assetKey].price *= 1.25; } 
                else if (data.action === "dump") { assetsData[assetKey].price *= 0.75; }
                chart.update(); updateUI();
            }
        });
    });

    // Изменение рынка и начисление пассивного дохода
    function tickMarket() {
        if (!currentUser) return;
        let stats = getStats();
        
        if (partsInventory.powerOn && stats.activeRigs > 0) {
            balance += stats.passiveIncome; // Исправлено: убрано избыточное умножение на 2
            let rawHeatGain = (partsInventory.gpu_low * 0.08) + (partsInventory.gpu_mid * 0.25) + (partsInventory.gpu_high * 1.1);
            partsInventory.heat += rawHeatGain;
            partsInventory.powerBill += (partsInventory.gpu_low * 0.5) + (partsInventory.gpu_mid * 2.5) + (partsInventory.gpu_high * 14);
            
            if (partsInventory.powerBill > balance * 4 && balance > 300) {
                partsInventory.powerOn = false;
                showToast("Энергосеть заблокирована за долги!", "error");
            }
        }
        
        partsInventory.heat = Math.max(25, partsInventory.heat - stats.totalCoolingPower);

        for (let key in assetsData) {
            let ast = assetsData[key];
            let vol = key === 'btc' || key === 'pegasus' ? 7.0 : 3.0;
            ast.price *= (1 + ((Math.random() - 0.492) * vol) / 100);
            if (ast.price < 0.1) ast.price = 0.1;
            ast.history.push(ast.price);
            if (ast.history.length > 20) ast.history.shift();
        }

        let active = assetsData[currentAsset];
        const priceEl = document.getElementById('price');
        if (priceEl) {
            priceEl.innerText = '$' + active.price.toFixed(2);
            let lastDiff = active.history[active.history.length-1] - active.history[active.history.length-2];
            let newGradient = canvasCtx.createLinearGradient(0, 0, 0, 150);
            if (lastDiff >= 0) {
                priceEl.className = 'price-up'; chart.data.datasets[0].borderColor = '#00e676';
                newGradient.addColorStop(0, 'rgba(0, 230, 118, 0.15)'); newGradient.addColorStop(1, 'rgba(0, 230, 118, 0.0)');
            } else {
                priceEl.className = 'price-down'; chart.data.datasets[0].borderColor = '#ff3d00';
                newGradient.addColorStop(0, 'rgba(255, 61, 0, 0.15)'); newGradient.addColorStop(1, 'rgba(255, 61, 0, 0.0)');
            }
            chart.data.datasets[0].backgroundColor = newGradient;
        }
        
        chart.data.datasets[0].data = [...active.history];
        chart.update(); 
        updateUI();
        
        // Раз в 2 секунды автоматически отправляем состояние в базу данных без спама
        syncOnline();
    }

    // Безопасная синхронизация с базой данных
    async function syncOnline() {
        if (!currentUser || isInitialLoad) return;
        let stats = getStats();
        try {
            await setDoc(doc(db, "users", currentUser), { 
                balance, 
                exp, 
                lastBonusTime, 
                usedPromos, 
                partsInventory: partsInventory, 
                customRank, 
                isBanned,
                assets: {
                    pegasus: { shares: assetsData.pegasus.shares, shortShares: assetsData.pegasus.shortShares, shortPrice: assetsData.pegasus.shortPrice },
                    btc: { shares: assetsData.btc.shares, shortShares: assetsData.btc.shortShares, shortPrice: assetsData.btc.shortPrice },
                    eth: { shares: assetsData.eth.shares, shortShares: assetsData.eth.shortShares, shortPrice: assetsData.eth.shortPrice },
                    aapl: { shares: assetsData.aapl.shares, shortShares: assetsData.aapl.shortShares, shortPrice: assetsData.aapl.shortPrice },
                    gold: { shares: assetsData.gold.shares, shortShares: assetsData.gold.shortShares, shortPrice: assetsData.gold.shortPrice }
                }
            }, { merge: true });
            
            await setDoc(doc(db, "players", currentUser), { balance, score: balance.toFixed(2), lvl: stats.lvl }, { merge: true });
        } catch(e) {
            console.error("Ошибка синхронизации данных с Firestore:", e);
        }
    }

    // Слушатель Лидерборда ТОП-5
    const q = query(collection(db, "players"), orderBy("balance", "desc"), limit(5));
    onSnapshot(q, (snapshot) => {
        let html = ""; 
        snapshot.forEach((doc) => {
            let data = doc.data();
            html += `<li><strong>${doc.id} (LVL ${data.lvl || 1})</strong> <span>$${data.score || 0}</span></li>`;
        });
        const lbEl = document.getElementById('leaderboard');
        if (lbEl) lbEl.innerHTML = html;
    });

    if (currentUser) loadUserData(currentUser);
    setInterval(tickMarket, 2000);
</script>
