<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Shield Casino</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --primary: #38bdf8;
            --primary-hover: #0284c7;
            --success: #4ade80;
            --error: #f43f5e;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }

        .auth-card, .game-card {
            background: var(--bg-card);
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            padding: 32px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
            transition: all 0.3s ease;
        }

        .game-card { max-width: 600px; }

        .logo-area {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo-area h1 {
            font-size: 24px;
            margin: 10px 0 5px 0;
            color: var(--text);
            font-weight: 600;
        }

        /* Вкладки как в современных интерфейсах */
        .tabs {
            display: flex;
            border-bottom: 1px solid #334155;
            margin-bottom: 24px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 500;
            transition: 0.2s;
            border-bottom: 2px solid transparent;
        }
        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            background: #0f172a;
            border: 1px solid #475569;
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }

        button {
            width: 100%;
            background: var(--primary);
            color: #0f172a;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: var(--primary-hover); color: white; }

        .error-msg {
            color: var(--error);
            font-size: 14px;
            margin-top: 12px;
            min-height: 20px;
        }

        .hidden { display: none !important; }

        /* Игровой интерфейс */
        .balance-box {
            background: #0f172a;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
        .reels-display {
            font-size: 44px;
            background: #0f172a;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            letter-spacing: 8px;
            border: 1px dashed var(--primary);
        }
        .grid-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .grid-buttons button { background: #334155; color: white; }
        .grid-buttons button:hover { background: #475569; }

        .logs-container {
            background: #0f172a;
            border-radius: 8px;
            padding: 12px;
            text-align: left;
            height: 100px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <!-- ОКНО ОРГАНАЙЗЕРА СЕССИИ (ВХОД / РЕГИСТРАЦИЯ) -->
    <div class="auth-card" id="auth-card">
        <div class="logo-area">
            <h1>🛡️ Cyber Shield</h1>
        </div>
        
        <div class="tabs">
            <div class="tab active" id="tab-login" onclick="switchTab('login')">Войти</div>
            <div class="tab" id="tab-register" onclick="switchTab('register')">Регистрация</div>
        </div>

        <div class="input-group">
            <label for="username">Имя пользователя</label>
            <input type="text" id="username" placeholder="Введите логин">
        </div>
        <div class="input-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" placeholder="Введите пароль">
        </div>

        <button id="auth-btn" onclick="submitAuth()">Войти в аккаунт</button>
        <div id="auth-err" class="error-msg"></div>
    </div>

    <!-- ОКНО ИГРЫ -->
    <div class="game-card hidden" id="game-card">
        <div class="balance-box">
            <div style="color: var(--text-muted); font-size: 14px;">Авторизован: <b id="user-display" style="color:white"></b></div>
            <div style="font-size: 28px; font-weight: bold; margin-top: 5px;"><span id="balance-display" style="color: var(--success)">0</span> $</div>
        </div>

        <div class="reels-display" id="game-result">🎰 🎰 🎰</div>
        <div id="game-status" style="font-weight: 500; min-height: 24px; margin-bottom: 15px;">Вы готовы к игре? Ставка: 200$</div>

        <div class="grid-buttons">
            <button onclick="play('slots')">🎰 Играть в Слоты</button>
            <button onclick="play('dice')">🎲 Бросить Кости</button>
        </div>

        <div class="logs-container" id="log-box"></div>
        <button onclick="logout()" style="background: transparent; color: var(--text-muted); font-size: 14px; margin-top: 15px; width: auto; padding: 5px 10px;">Выйти из профиля</button>
    </div>

<script>
    // ТВОЙ НОВЫЙ SECURE URL ИЗ TERMUX (Pinggy с поддержкой HTTPS)
    const SERVER_URL = "https://aiazy-188-72-72-78.free.pinggy.net"; 
    let currentMode = "login";
    let sessionToken = "";

    function switchTab(mode) {
        currentMode = mode;
        document.getElementById('tab-login').classList.toggle('active', mode === 'login');
        document.getElementById('tab-register').classList.toggle('active', mode === 'register');
        document.getElementById('auth-btn').innerText = mode === 'login' ? 'Войти в аккаунт' : 'Создать аккаунт';
        document.getElementById('auth-err').innerText = "";
    }

    function submitAuth() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const endpoint = currentMode === 'login' ? '/api/login' : '/api/register';
        
        fetch(`${SERVER_URL}${endpoint}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                // Обходим заглушку-предупреждение от бесплатного Pinggy
                'X-Pinggy-No-Screen': 'true'
            },
            body: JSON.stringify({ username: u, password: p })
        })
        .then(res => {
            if(!res.ok) return res.json().then(e => { throw new Error(e.error) });
            return res.json();
        })
        .then(data => {
            if (currentMode === 'register') {
                alert('Регистрация успешна! Теперь войдите.');
                switchTab('login');
            } else {
                sessionToken = data.token;
                document.getElementById('user-display').innerText = data.username;
                document.getElementById('balance-display').innerText = data.balance;
                document.getElementById('auth-card').classList.add('hidden');
                document.getElementById('game-card').classList.remove('hidden');
                addLog("Успешная авторизация в системе");
            }
        })
        .catch(err => document.getElementById('auth-err').innerText = err.message);
    }

    function play(gameType) {
        fetch(`${SERVER_URL}/api/play`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': sessionToken,
                // Здесь тоже обходим заглушку Pinggy, чтобы игра работала
                'X-Pinggy-No-Screen': 'true'
            },
            body: JSON.stringify({ game: gameType })
        })
        .then(res => { if(!res.ok) return res.json().then(e => {throw new Error(e.error)}); return res.json(); })
        .then(data => {
            document.getElementById('game-result').innerText = data.result.join(" ");
            document.getElementById('balance-display').innerText = data.balance;
            const status = document.getElementById('game-status');
            status.innerText = data.win ? `🎉 ВЫИГРЫШ: +${data.win_amount}$!` : "😢 Не повезло, ставка списана.";
            status.style.color = data.win ? "var(--success)" : "var(--text-muted)";
            addLog(`${data.log} | Баланс: ${data.balance}$`);
        })
        .catch(err => {
            document.getElementById('game-status').innerText = err.message;
            document.getElementById('game-status').style.color = "var(--error)";
        });
    }

    function addLog(text) {
        const box = document.getElementById('log-box');
        box.innerHTML += `[${new Date().toLocaleTimeString()}] ${text}<br>`;
        box.scrollTop = box.scrollHeight;
    }

    function logout() {
        sessionToken = "";
        document.getElementById('auth-card').classList.remove('hidden');
        document.getElementById('game-card').classList.add('hidden');
    }
</script>
</body>
</html>
