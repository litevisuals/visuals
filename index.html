<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pegasus Tycoon Online</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #08080c; color: #ffffff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 480px; margin: 0 auto; background: #0f0f15; padding: 15px; border-radius: 20px; border: 1px solid #1f1f2e; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1f1f2e; padding-bottom: 10px; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .stat-box { background: #151522; padding: 10px; border-radius: 12px; border: 1px solid #252538; }
        .stat-val { font-weight: bold; color: #00ffcc; font-size: 18px; margin-top: 4px; }
        .price-box { margin: 10px 0; padding: 12px; background: #151522; border-radius: 12px; border: 1px solid #252538; }
        #price { font-size: 34px; font-weight: bold; text-shadow: 0 0 10px rgba(0,255,200,0.2); }
        .price-up { color: #2ecc71; }
        .price-down { color: #e74c3c; }
        .news-ticker { background: #34495e; color: #fff; padding: 10px; font-weight: 500; border-radius: 10px; margin: 10px 0; font-size: 13px; border-left: 4px solid #f1c40f; }
        
        /* Кнопка Тапалки */
        .tap-btn { width: 100%; background: linear-gradient(135deg, #00ffcc, #0099ff); color: #000; font-size: 18px; font-weight: bold; padding: 15px; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,255,200,0.3); margin-bottom: 10px; transition: 0.1s; }
        .tap-btn:active { transform: scale(0.96); filter: brightness(1.2); }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
        .btn { padding: 12px; font-size: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-buy { background: #2ecc71; color: white; }
        .btn-sell { background: #27ae60; color: white; }
        .btn-short { background: #e74c3c; color: white; }
        .btn-cover { background: #c0392b; color: white; }
        
        /* Секция Бизнеса и Кейсов */
        .sub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .panel-box { background: #151522; padding: 12px; border-radius: 12px; border: 1px solid #252538; text-align: left; }
        .panel-box h4 { margin: 0 0 8px 0; font-size: 14px; color: #f1c40f; text-align: center; }
        .sm-btn { width: 100%; padding: 8px; font-size: 12px; background: #34495e; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .sm-btn:disabled { background: #222; color: #555; }

        .leaderboard-box { background: #151522; padding: 12px; border-radius: 12px; text-align: left; margin-top: 15px; border: 1px solid #252538; }
        .leaderboard-box h3 { margin: 0 0 8px 0; text-align: center; color: #f1c40f; font-size: 15px; }
        ol { padding-left: 15px; margin: 0; }
        li { padding: 5px 0; border-bottom: 1px solid #222230; font-size: 13px; display: flex; justify-content: space-between; }
        .rank-name { color: #888; font-size: 11px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>💼 <span id="playerName">...</span> <span id="playerRank" class="rank-name">()</span></div>
        <div>LVL: <span id="playerLvl" style="color:#00ffcc; font-weight:bold;">1</span></div>
    </div>

    <button class="tap-btn" id="btnTap">💸 ТАПАТЬ БАБЛО (+$5)</button>

    <div class="stats">
        <div class="stat-box">Баланс Cash<br><div class="stat-val" id="balance">$10000.00</div></div>
        <div class="stat-box">Пассивный доход<br><div class="stat-val" id="pps" style="color:#f1c40f;">$0/сек</div></div>
        <div class="stat-box">Лонг Акции<br><div class="stat-val" id="shares" style="color:#fff;">0</div></div>
        <div class="stat-box">Шорт Акции<br><div class="stat-val" id="shortShares" style="color:#fff;">0</div></div>
    </div>

    <div class="price-box">
        <div id="price" class="price-up">$100.00</div>
    </div>

    <div class="news-ticker" id="news">📈 Тренды стабильны. Ждем отчетов...</div>

    <canvas id="marketChart" height="140"></canvas>

    <div style="font-size:13px; margin: 5px 0;">
        <label>Плечо: </label>
        <select id="leverage">
            <option value="1">x1 (Обычный режим)</option>
            <option value="3">x3 (Маржинальный)</option>
            <option value="5">x5 (Макс Риск!)</option>
        </select>
    </div>

    <div class="btn-grid">
        <button class="btn btn-buy" id="btnBuy">КУПИТЬ ЛОНГ</button>
        <button class="btn btn-sell" id="btnSell">ПРОДАТЬ ЛОНГ</button>
        <button class="btn btn-short" id="btnShort">ОТКРЫТЬ ШОРТ</button>
        <button class="btn btn-cover" id="btnCover">ЗАКРЫТЬ ШОРТ</button>
    </div>

    <div class="sub-grid">
        <div class="panel-box">
            <h4>⛏️ МАЙНИНГ ФЕРМЫ</h4>
            <div id="farmInfo" style="font-size:11px; color:#aaa;">Ферм: 0 (+$0/с)</div>
            <button class="sm-btn" id="btnBuyFarm">Купить Ферму ($1,500)</button>
        </div>
        <div class="panel-box">
            <h4>🎁 ЛУТБОКСЫ</h4>
            <div style="font-size:11px; color:#aaa; text-align:center;">Шанс х3 или Слив!</div>
            <button class="sm-btn" id="btnOpenCase" style="background:#9b59b6;">Открыть Кейс ($2,000)</button>
        </div>
    </div>

    <div class="leaderboard-box">
        <h3>🏆 ТОП-5 ОНЛАЙН МАГНАТОВ</h3>
        <ol id="leaderboard"><li>Загрузка...</li></ol>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDEaVk5ynHpi2uFu2d7Zqc3PAAPR58IeGI",
        authDomain: "database-2aad8.firebaseapp.com",
        projectId: "database-2aad8",
        storageBucket: "database-2aad8.firebasestorage.app",
        messagingSenderId: "1095120564272",
        appId: "1:1095120564272:web:eeefe80cb3816df52c3df5",
        measurementId: "G-49PRFBPGZ9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let username = localStorage.getItem('crypto_trader_name') || "Трейдер";
    document.getElementById('playerName').innerText = username;

    // Переменные
    let balance = parseFloat(localStorage.getItem('t_bal')) || 10000;
    let shares = parseInt(localStorage.getItem('t_sh')) || 0;
    let shortShares = parseInt(localStorage.getItem('t_ssh')) || 0;
    let shortPrice = parseFloat(localStorage.getItem('t_sp')) || 0;
    let exp = parseInt(localStorage.getItem('t_exp')) || 0;
    let farms = parseInt(localStorage.getItem('t_farms')) || 0; // Кол-во майнинг ферм

    let currentPrice = 100;
    let priceHistory = [100];
    let labels = ['0s'];
    let timeTick = 0;
    let marketTrend = 0;

    const ranks = ["Новичок", "Скальпер", "Инвестор", "Кит рынка", "Волк с Уолл-Стрит"];

    updateUI();

    function getStats() {
        let lvl = Math.floor(Math.sqrt(exp / 120)) + 1;
        let rank = ranks[Math.min(lvl - 1, ranks.length - 1)];
        let shortProfit = shortShares > 0 ? (shortPrice - currentPrice) * shortShares : 0;
        let passiveIncome = farms * 25; // Каждая ферма приносит $25 в секунду
        let equity = balance + (shares * currentPrice) + shortProfit + (farms * 1500 * 0.8);
        return { lvl, rank, equity, passiveIncome };
    }

    function updateUI() {
        let stats = getStats();
        document.getElementById('balance').innerText = '$' + balance.toFixed(2);
        document.getElementById('shares').innerText = shares;
        document.getElementById('shortShares').innerText = shortShares;
        document.getElementById('playerLvl').innerText = stats.lvl;
        document.getElementById('playerRank').innerText = `(${stats.rank})`;
        document.getElementById('pps').innerText = `$${stats.passiveIncome}/сек`;
        document.getElementById('farmInfo').innerText = `Ферм: ${farms} (+$${stats.passiveIncome}/с)`;
        
        // Блокировка кнопок покупки бизнеса, если мало денег
        document.getElementById('btnBuyFarm').disabled = balance < 1500;
        document.getElementById('btnOpenCase').disabled = balance < 2000;
    }

    // ТАПАЛКА БАБЛА
    document.getElementById('btnTap').addEventListener('click', () => {
        let stats = getStats();
        let tapPower = 5 + (stats.lvl * 2); // Чем выше уровень, тем больше за клик!
        balance += tapPower;
        exp += 5;
        updateUI();
        syncOnline();
    });

    // ПОКУПКА МАЙНИНГ ФЕРМЫ
    document.getElementById('btnBuyFarm').addEventListener('click', () => {
        if (balance >= 1500) {
            balance -= 1500;
            farms++;
            exp += 100;
            updateUI();
            syncOnline();
        }
    });

    // ОТКРЫТИЕ ЛУТБОКСА
    document.getElementById('btnOpenCase').addEventListener('click', () => {
        if (balance >= 2000) {
            balance -= 2000;
            let roll = Math.random();
            if (roll > 0.65) { // Выигрыш Джекпота
                let win = Math.floor(Math.random() * 4000) + 2500;
                balance += win;
                exp += 250;
                alert(`🎉 ОКУП! Из кейса выпало: $${win}!`);
            } else if (roll > 0.3) { // Утешительный приз
                balance += 800;
                exp += 50;
                alert("📦 Шлак... Выпало всего $800.");
            } else { // Слив
                exp += 20;
                alert("💀 СЛИВ! Кейс оказался пустым.");
            }
            updateUI();
            syncOnline();
        }
    });

    // ЛОНГ / ШОРТ МЕХАНИКА
    document.getElementById('btnBuy').addEventListener('click', () => {
        let lev = parseInt(document.getElementById('leverage').value);
        if (balance >= (currentPrice / lev)) { balance -= (currentPrice / lev); shares++; exp += 15; updateUI(); syncOnline(); }
    });
    document.getElementById('btnSell').addEventListener('click', () => {
        if (shares > 0) { let lev = parseInt(document.getElementById('leverage').value); balance += currentPrice / lev + (currentPrice - (currentPrice / lev)); shares--; exp += 10; updateUI(); syncOnline(); }
    });
    document.getElementById('btnShort').addEventListener('click', () => {
        if (shortShares === 0) shortPrice = currentPrice;
        let lev = parseInt(document.getElementById('leverage').value);
        if (balance >= (currentPrice / lev)) { balance -= (currentPrice / lev); shortShares++; exp += 15; updateUI(); syncOnline(); }
    });
    document.getElementById('btnCover').addEventListener('click', () => {
        if (shortShares > 0) { let lev = parseInt(document.getElementById('leverage').value); balance += (shortPrice / lev) + (shortPrice - currentPrice); shortShares--; if (shortShares === 0) shortPrice = 0; exp += 10; updateUI(); syncOnline(); }
    });

    // Рыночный движок и пассивный доход
    function tickMarket() {
        timeTick++;
        
        // Начисление пассивного дохода от ферм (раз в 2 секунды капает за 2 секунды)
        let stats = getStats();
        if (stats.passiveIncome > 0) {
            balance += stats.passiveIncome * 2;
        }

        if (timeTick % 10 === 0) {
            let newsList = [
                { text: "🚀 Запуск спутников Pegasus-X прошел успешно! Акции взлетают!", trend: 5 },
                { text: "📉 Крупнейший инвестор закрыл шорты. Паника!", trend: -4.5 },
                { text: "⚡ Регуляторы начали проверку компании. Курс падает!", trend: -3 },
                { text: "📊 Слияние века! Pegasus покупает конкурентов!", trend: 4 }
            ];
            let n = newsList[Math.floor(Math.random() * newsList.length)];
            document.getElementById('news').innerText = n.text;
            marketTrend = n.trend;
            setTimeout(() => { marketTrend = 0; document.getElementById('news').innerText = "💤 На рынке затишье..."; }, 6000);
        }

        let totalChange = ((Math.random() - 0.49) * 7) + marketTrend;
        currentPrice *= (1 + totalChange / 100);
        if (currentPrice < 0.5) currentPrice = 0.5;

        if (stats.equity <= 0) {
            balance = 1000; shares = 0; shortShares = 0; farms = 0;
            alert("🚨 МАРЖИН-КОЛЛ! Банкротство. Все активы и фермы изъяты.");
        }

        const priceEl = document.getElementById('price');
        priceEl.innerText = '$' + currentPrice.toFixed(2);
        priceEl.className = totalChange >= 0 ? 'price-up' : 'price-down';

        priceHistory.push(currentPrice);
        labels.push(timeTick + 's');
        if (priceHistory.length > 12) { priceHistory.shift(); labels.shift(); }
        chart.update();
        updateUI();
    }

    async function syncOnline() {
        let stats = getStats();
        localStorage.setItem('t_bal', balance);
        localStorage.setItem('t_sh', shares);
        localStorage.setItem('t_ssh', shortShares);
        localStorage.setItem('t_sp', shortPrice);
        localStorage.setItem('t_exp', exp);
        localStorage.setItem('t_farms', farms);

        try {
            await setDoc(doc(db, "players", username), {
                balance: stats.equity,
                score: stats.equity.toFixed(2),
                lvl: stats.lvl
            }, { merge: true });
        } catch (e) {}
    }

    const q = query(collection(db, "players"), orderBy("balance", "desc"), limit(5));
    onSnapshot(q, (snapshot) => {
        let html = "";
        snapshot.forEach((doc) => {
            let data = doc.data();
            html += `<li><div><strong>${doc.id}</strong> <span class='rank-name'>LVL ${data.lvl || 1}</span></div> <span>$${data.score || 0}</span></li>`;
        });
        document.getElementById('leaderboard').innerHTML = html;
    });

    const ctx = document.getElementById('marketChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: labels, datasets: [{ label: 'Цена ($)', data: priceHistory, borderColor: '#00ffcc', borderWidth: 2, tension: 0.1, fill: false }] },
        options: { responsive: true, scales: { x: { display: false }, y: { beginAtZero: false } } }
    });

    setInterval(tickMarket, 2000);
</script>
</body>
</html>
