<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Cyber Shield Casino</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #e2e8f0; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #1e293b; padding: 30px; border-radius: 12px; border: 2px solid #38bdf8; box-shadow: 0 4px 20px rgba(56, 189, 248, 0.2); }
        input { background: #334155; border: 1px solid #475569; color: white; padding: 10px; margin: 5px; border-radius: 6px; font-size: 16px; }
        button { background: #0284c7; color: white; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; margin: 10px 5px; transition: 0.2s; }
        button:hover { background: #0369a1; }
        .hidden { display: none; }
        .reels { font-size: 40px; background: #0f172a; padding: 15px; margin: 15px 0; border-radius: 8px; letter-spacing: 5px; }
        .logs { background: #0f172a; text-align: left; padding: 10px; border-radius: 6px; max-height: 120px; overflow-y: auto; font-size: 13px; color: #94a3b8; }
        .error { color: #f43f5e; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛡️ Cyber Shield Casino 🎰</h1>

    <!-- Форма входа -->
    <div id="auth-block">
        <h3>Вход в систему</h3>
        <input type="text" id="username" placeholder="Логин (admin)"><br>
        <input type="password" id="password" placeholder="Пароль (admin123)"><br>
        <button onclick="login()">Войти</button>
        <p id="auth-err" class="error"></p>
    </div>

    <!-- Игровой интерфейс -->
    <div id="game-block" class="hidden">
        <h3>Добро пожаловать, <span id="user-display" style="color:#38bdf8"></span>!</h3>
        <h2>Баланс: <span id="balance-display" style="color:#4ade80">0</span> $</h2>
        <p style="color: #94a3b8">Фиксированная ставка: 200 $</p>

        <hr style="border-color: #334155;">

        <div>
            <button onclick="play('slots')">🎰 Крутить Слоты</button>
            <button onclick="play('dice')">🎲 Бросить Кости</button>
        </div>

        <div class="reels" id="game-result">❓ ❓ ❓</div>
        <p id="game-status"></p>

        <h4>История операций (Логи):</h4>
        <div class="logs" id="log-box"></div>
        <button onclick="logout()" style="background:#475569; font-size:12px; padding:5px 10px;">Выйти</button>
    </div>
</div>

<script>
    // ТУТ УКАЖИ СВОЙ АДРЕС ИЗ NGROK ИЛИ LOCAL TUNNEL ПОСЛЕ ВЫВОДА ПЛАНШЕТА В СЕТЬ
    const SERVER_URL = "http://localhost:5000"; 
    let sessionToken = "";

    function login() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        
        fetch(`${SERVER_URL}/api/login`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username: u, password: p })
        })
        .then(res => { if(!res.ok) throw new Error("Неверные данные"); return res.json(); })
        .then(data => {
            sessionToken = data.token;
            document.getElementById('user-display').innerText = data.username;
            document.getElementById('balance-display').innerText = data.balance;
            
            document.getElementById('auth-block').classList.add('hidden');
            document.getElementById('game-block').classList.remove('hidden');
            addLog("Успешный вход в аккаунт");
        })
        .catch(err => document.getElementById('auth-err').innerText = err.message);
    }

    function play(gameType) {
        fetch(`${SERVER_URL}/api/play`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': sessionToken // Передаем токен в заголовках защиты
            },
            body: JSON.stringify({ game: gameType })
        })
        .then(res => { if(!res.ok) return res.json().then(e => {throw new Error(e.error)}); return res.json(); })
        .then(data => {
            document.getElementById('game-result').innerText = data.result.join(" ");
            document.getElementById('balance-display').innerText = data.balance;
            
            const status = document.getElementById('game-status');
            if(data.win) {
                status.innerText = `🎉 ПЛЮС ${data.win_amount} $!`;
                status.style.color = "#4ade80";
            } else {
                status.innerText = "😢 Минус ставка.";
                status.style.color = "#94a3b8";
            }
            addLog(`${data.log} -> Баланс: ${data.balance}$`);
        })
        .catch(err => {
            document.getElementById('game-status').innerText = err.message;
            document.getElementById('game-status').style.color = "#f43f5e";
            addLog(`Ошибка: ${err.message}`);
        });
    }

    function addLog(text) {
        const box = document.getElementById('log-box');
        box.innerHTML += `[${new Date().toLocaleTimeString()}] ${text}<br>`;
        box.scrollTop = box.scrollHeight;
    }

    function logout() {
        sessionToken = "";
        document.getElementById('auth-block').classList.remove('hidden');
        document.getElementById('game-block').classList.add('hidden');
    }
</script>
</body>
</html>
