<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LITEVISUALS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #09090e; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center;
            align-items: center; 
            padding: 16px;
        }

        /* Карточка один в один по форме из PulseVisuals */
        .main-card {
            width: 100%;
            max-width: 380px;
            background: #111116;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 24px;
            padding: 35px 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .form-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
        .form-subtitle { font-size: 13px; color: #62627a; margin-bottom: 28px; }

        .input-group { position: relative; margin-bottom: 16px; }
        .input-group input {
            width: 100%;
            background: #17171f;
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            padding: 18px 50px 18px 18px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        .input-group input:focus { border-color: #5b57ef; background: #1a1a26; }
        
        /* Защита от стандартного желтого фона браузера */
        .input-group input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 1000px #17171f inset !important;
            -webkit-text-fill-color: #ffffff !important;
        }

        .eye-icon { 
            position: absolute; right: 18px; top: 50%; transform: translateY(-50%); 
            color: #4e4e5e; cursor: pointer; font-size: 16px; user-select: none;
        }

        /* Кнопка "Войти" */
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #5b57ef 0%, #3b37c7 100%);
            color: #ffffff;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(91, 87, 239, 0.25);
            transition: all 0.15s;
            margin-top: 8px;
            margin-bottom: 24px;
        }
        .btn-submit:active { transform: scale(0.98); opacity: 0.95; }

        /* Нижние ссылки */
        .footer-links { display: flex; justify-content: space-between; font-size: 13px; }
        .link-secondary { color: #525266; text-decoration: none; cursor: pointer; }
        .link-secondary span { color: #a2a2bd; transition: color 0.2s; }
        .link-secondary:hover span { color: #fff; }

        /* Личный кабинет (после авторизации) */
        #client-area { display: none; text-align: center; }
        .welcome-text { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
        .user-email { font-size: 13px; color: #525266; margin-bottom: 30px; font-family: monospace; }

        #toast { 
            position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); 
            background: #fff; color: #000; padding: 14px 28px; border-radius: 50px; 
            font-size: 13px; font-weight: 700; opacity: 0; z-index: 1000;
            transition: all 0.3s cubic-bezier(0.1, 1, 0.1, 1); pointer-events: none; 
            white-space: nowrap;
        }
        #toast.show { bottom: 30px; opacity: 1; }
    </style>
</head>
<body>

    <div class="main-card">
        <div id="auth-area">
            <div class="form-title" id="form-title">Авторизация</div>
            <div class="form-subtitle" id="form-subtitle">Войди, чтобы попасть в свой профиль</div>

            <div class="input-group">
                <input type="email" id="email" placeholder="Email">
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="Пароль">
                <span class="eye-icon" onclick="togglePassword()">👁</span>
            </div>

            <button class="btn-submit" id="submit-btn" onclick="handleAuth()">Войти</button>

            <div class="footer-links">
                <div class="link-secondary" onclick="toggleMode()"><span id="switch-txt">Нет аккаунта? Регистрация</span></div>
                <div class="link-secondary"><span>Забыл пароль</span></div>
            </div>
        </div>

        <div id="client-area">
            <div class="welcome-text">Доступ получен</div>
            <div class="user-email" id="user-display-email">...</div>
            <button class="btn-submit" onclick="copyScript()">Скопировать скрипт</button>
            <button class="btn-submit" style="background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); margin-top:0; color:#62627a;" onclick="logout()">Выйти из профиля</button>
        </div>
    </div>

    <div id="toast">Готово</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Твоя рабочая связка с Supabase
        const SUPABASE_URL = "https://ycvvuszmrydfuyuaavpk.supabase.co";
        const SUPABASE_ANON_KEY = "Sb_publishable_4I7C54sWOsg5W62bMElrDA_HIRi8pNG"; 

        let supabase;
        try { supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch(e) {}

        let isLoginMode = true;

        window.onload = async () => {
            if (supabase) {
                const { data: { session } } = await supabase.auth.getSession();
                if (session) showCabinet(session.user.email);
            }
        };

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('form-title').innerText = isLoginMode ? "Авторизация" : "Регистрация";
            document.getElementById('form-subtitle').innerText = isLoginMode ? "Войди, чтобы попасть в свой профиль" : "Создай профиль, чтобы продолжить";
            document.getElementById('submit-btn').innerText = isLoginMode ? "Войти" : "Зарегистрироваться";
            document.getElementById('switch-txt').innerText = isLoginMode ? "Нет аккаунта? Регистрация" : "Уже есть профиль? Войти";
        }

        function togglePassword() {
            const p = document.getElementById('password');
            p.type = p.type === "password" ? "text" : "password";
        }

        async function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if(!email || !password) return showToast("Заполните все поля");
            if(!supabase) return showToast("Ошибка базы данных");

            if(isLoginMode) {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if(error) showToast("Неверный логин или пароль");
                else showCabinet(data.user.email);
            } else {
                if(password.length < 6) return showToast("Пароль от 6 символов");
                const { data, error } = await supabase.auth.signUp({ email, password });
                if(error) showToast(error.message);
                else showToast("Регистрация успешна!");
            }
        }

        function showCabinet(email) {
            document.getElementById('auth-area').style.display = 'none';
            document.getElementById('client-area').style.display = 'block';
            document.getElementById('user-display-email').innerText = email;
        }

        async function logout() {
            if (supabase) await supabase.auth.signOut();
            location.reload();
        }

        function copyScript() {
            const code = "loadstring(game:HttpGet('https://raw.githubusercontent.com/litevisuals/visuals/main/Lite_Pc.lua'))()";
            navigator.clipboard.writeText(code).then(() => { showToast("Скрипт скопирован!"); });
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
