<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lite Codex</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #21262d;
            --text: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #1f6feb;
            --radius: 6px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            line-height: 1.5;
        }

        .app {
            flex: 1;
            padding: 20px 16px;
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
        }

        .header {
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: 600;
        }

        /* Вкладки */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 16px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
            transition: 0.15s;
        }
        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* Карточка */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            margin-bottom: 12px;
        }
        .card-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        /* Метрики */
        .metrics {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .metric {
            flex: 1;
            text-align: center;
        }
        .metric .value {
            font-size: 1.2rem;
            font-weight: 600;
            color: #f0f6fc;
        }
        .metric .label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* Кнопки */
        .btn {
            display: block;
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: 0.85rem;
            font-weight: 500;
            text-align: center;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            margin-bottom: 8px;
            transition: background 0.15s;
        }
        .btn.primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .btn:active {
            background: #1c2128;
        }

        /* Сообщение */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #30363d;
            color: #f0f6fc;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.8rem;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <div class="header">Lite Codex</div>

        <div class="tabs">
            <button class="tab active" data-tab="overview">Обзор</button>
            <button class="tab" data-tab="infra">Инфраструктура</button>
            <button class="tab" data-tab="services">Сервисы</button>
            <button class="tab" data-tab="social">Социальное</button>
        </div>

        <!-- Обзор -->
        <div class="tab-content active" id="tab-overview">
            <div class="card">
                <div class="card-title">Сводка</div>
                <div class="metrics">
                    <div class="metric">
                        <div class="value" id="balance">--</div>
                        <div class="label">Баланс</div>
                    </div>
                    <div class="metric">
                        <div class="value" id="income">--</div>
                        <div class="label">Доход/мин</div>
                    </div>
                    <div class="metric">
                        <div class="value" id="unclaimed">--</div>
                        <div class="label">К сбору</div>
                    </div>
                </div>
                <button class="btn primary" onclick="sendCmd('/collect')">Собрать прибыль</button>
                <button class="btn" onclick="sendCmd('/profile')">Обновить сводку</button>
            </div>
            <div class="card">
                <div class="card-title">Действия</div>
                <button class="btn" onclick="sendCmd('/buy_server')">Приобрести сервер</button>
                <button class="btn" onclick="sendCmd('/buy_asic')">Приобрести майнинг‑ферму</button>
                <button class="btn" onclick="sendCmd('/boost_1.5')">Бустер ×1.5 (30 мин)</button>
            </div>
        </div>

        <!-- Инфраструктура -->
        <div class="tab-content" id="tab-infra">
            <div class="card">
                <div class="card-title">Серверы</div>
                <button class="btn primary" onclick="sendCmd('/buy_server')">Новый сервер</button>
                <button class="btn" onclick="sendCmd('/servers')">Список серверов</button>
            </div>
            <div class="card">
                <div class="card-title">Майнинг</div>
                <button class="btn primary" onclick="sendCmd('/buy_asic')">Новая ферма</button>
                <button class="btn" onclick="sendCmd('/asics')">Список ферм</button>
            </div>
        </div>

        <!-- Сервисы -->
        <div class="tab-content" id="tab-services">
            <div class="card">
                <div class="card-title">Казино</div>
                <button class="btn" onclick="sendCmd('/casino')">Перейти</button>
            </div>
            <div class="card">
                <div class="card-title">Бустеры</div>
                <button class="btn" onclick="sendCmd('/boost_1.5')">Множитель ×1.5 (30 мин)</button>
                <button class="btn" onclick="sendCmd('/boost_2.0')">Множитель ×2.0 (15 мин)</button>
            </div>
            <div class="card">
                <div class="card-title">Задания</div>
                <button class="btn" onclick="sendCmd('/quests')">Ежедневные задания</button>
            </div>
        </div>

        <!-- Социальное -->
        <div class="tab-content" id="tab-social">
            <div class="card">
                <div class="card-title">Рейтинг</div>
                <button class="btn" onclick="sendCmd('/top')">Топ‑10 игроков</button>
            </div>
            <div class="card">
                <div class="card-title">Кланы</div>
                <button class="btn" onclick="sendCmd('/clans')">Список кланов</button>
            </div>
            <div class="card">
                <div class="card-title">Аукцион</div>
                <button class="btn" onclick="sendCmd('/auction')">Активные лоты</button>
            </div>
            <div class="card">
                <div class="card-title">Рефералы</div>
                <button class="btn" onclick="sendCmd('/referral')">Пригласительная ссылка</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const BOT_TOKEN = '8899484541:AAGJu908uXAtbM9pB-HLdqfzfwk9GGAJ6zc';
        const ADMIN_ID = '6007594909';

        // Попытка загрузить сохранённые данные
        function loadStoredMetrics() {
            const saved = localStorage.getItem('lx_metrics');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    if (data.balance !== undefined) document.getElementById('balance').textContent = formatNum(data.balance);
                    if (data.income !== undefined) document.getElementById('income').textContent = data.income + '/мин';
                    if (data.unclaimed !== undefined) document.getElementById('unclaimed').textContent = formatNum(data.unclaimed);
                } catch(e) {}
            }
        }

        function formatNum(num) {
            if (typeof num !== 'number') return num;
            return num.toLocaleString('ru-RU', { maximumFractionDigits: 0 });
        }

        loadStoredMetrics();

        // Telegram Mini App – можно обновить данные через CloudStorage
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            // Попытаемся прочитать данные из CloudStorage
            tg.CloudStorage.getItem('balance', (err, val) => {
                if (!err && val) document.getElementById('balance').textContent = formatNum(Number(val));
            });
            tg.CloudStorage.getItem('income', (err, val) => {
                if (!err && val) document.getElementById('income').textContent = val + '/мин';
            });
            tg.CloudStorage.getItem('unclaimed', (err, val) => {
                if (!err && val) document.getElementById('unclaimed').textContent = formatNum(Number(val));
            });
        }

        const toast = document.getElementById('toast');
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        async function sendCmd(cmd) {
            try {
                const resp = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: ADMIN_ID,
                        text: cmd,
                        disable_notification: true
                    })
                });
                const data = await resp.json();
                if (data.ok) {
                    showToast('Команда отправлена');
                    // После /profile можно попробовать сохранить ответ, но проще показать уведомление
                } else {
                    showToast(data.description || 'Ошибка');
                }
            } catch(e) {
                showToast('Нет соединения');
            }
        }

        // Переключение вкладок
        function switchTab(name) {
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('[data-tab="' + name + '"]').forEach(el => el.classList.add('active'));
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + name).classList.add('active');
        }
        document.querySelectorAll('.tab').forEach(el => {
            el.addEventListener('click', () => switchTab(el.dataset.tab));
        });
    </script>
</body>
</html>
