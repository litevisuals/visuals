<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lite Codex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #0f172a);
            color: var(--tg-theme-text-color, #e2e8f0);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        #not-telegram {
            text-align: center;
            background: var(--tg-theme-secondary-bg-color, #1e293b);
            padding: 32px 20px;
            border-radius: 24px;
            max-width: 320px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        #not-telegram h2 { margin-bottom: 12px; font-size: 1.5em; }
        #not-telegram p { margin-bottom: 20px; color: #94a3b8; }
        .telegram-link {
            display: inline-block;
            background: #2b9fdb;
            color: white;
            padding: 12px 24px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: bold;
        }
        .app {
            width: 100%;
            max-width: 400px;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color, #1e293b);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .profile {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
        }
        .info { flex: 1; }
        .name { font-weight: bold; font-size: 1.1em; }
        .balance { color: #60a5fa; font-weight: 600; }
        .actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        button:active { opacity: 0.8; }
        .btn-server { background: #3b82f6; }
        .btn-asic { background: #8b5cf6; }
        .btn-booster { background: #f59e0b; }
        .btn-refresh { background: #10b981; }
        .btn-quests { background: #6366f1; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <!-- Заглушка для внешнего браузера -->
    <div id="not-telegram" class="hidden">
        <h2>📱 Откройте в Telegram</h2>
        <p>Этот личный кабинет работает только внутри Telegram.</p>
        <a href="https://t.me/LiteCodexBot" target="_blank" class="telegram-link">Перейти в бота</a>
    </div>

    <!-- Mini App интерфейс -->
    <div id="app" class="app hidden">
        <!-- Профиль -->
        <div class="card">
            <div class="profile">
                <div class="avatar" id="avatar">👤</div>
                <div class="info">
                    <div class="name" id="userName">Игрок</div>
                    <div class="balance">💰 <span id="balance">—</span> монет</div>
                </div>
            </div>
        </div>

        <!-- Действия -->
        <div class="card">
            <div class="actions">
                <button class="btn-server" onclick="sendAction('buy_server')">
                    ➕ Купить сервер
                </button>
                <button class="btn-asic" onclick="sendAction('buy_asic')">
                    ⛏ Купить ASIC-ферму
                </button>
                <button class="btn-booster" onclick="sendAction('activate_booster', {multiplier: 1.5})">
                    ⚡ Бустер x1.5 (30 мин)
                </button>
                <button class="btn-booster" onclick="sendAction('activate_booster', {multiplier: 2.0})">
                    💥 Бустер x2.0 (15 мин)
                </button>
                <button class="btn-refresh" onclick="sendAction('get_profile')">
                    🔄 Обновить баланс
                </button>
                <button class="btn-quests" onclick="sendAction('show_quests')">
                    📋 Задания
                </button>
            </div>
        </div>
    </div>

    <script>
        // Проверяем, открыто ли в Telegram
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();

            // Показываем интерфейс
            document.getElementById('app').classList.remove('hidden');

            // Данные пользователя из Telegram
            const user = tg.initDataUnsafe?.user;
            if (user) {
                document.getElementById('userName').textContent = user.first_name || user.username;
                if (user.photo_url) {
                    document.getElementById('avatar').innerHTML = `<img src="${user.photo_url}" style="width:48px;height:48px;border-radius:50%;">`;
                } else {
                    document.getElementById('avatar').textContent = (user.first_name || '?')[0].toUpperCase();
                }
            }

            // Попытка загрузить сохранённый баланс из CloudStorage
            tg.CloudStorage.getItem('balance', (err, value) => {
                if (!err && value) {
                    document.getElementById('balance').textContent = value;
                }
            });

            // Функция отправки действия боту
            window.sendAction = function(action, params = {}) {
                const data = JSON.stringify({ action, ...params });
                tg.sendData(data);
                // После отправки Mini App закроется (или можно оставить)
            };

            // Обработка ответов от бота (через события не получится, но можно обновлять CloudStorage)
            // Бот может записать новый баланс в CloudStorage после действия, но это требует отдельной логики.
            // Пока просто закрываем Mini App после действия.
        } else {
            // Открыто в обычном браузере
            document.getElementById('not-telegram').classList.remove('hidden');
        }
    </script>
</body>
</html>
