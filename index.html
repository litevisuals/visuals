<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сканирование...</title>
    <style>
        body { margin: 0; background: black; color: white; font-family: sans-serif; overflow: hidden; text-align: center; }
        .screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; box-sizing: border-box; }
        .hidden { display: none !important; }
        
        /* Белая вспышка на весь экран */
        .flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; z-index: 999; pointer-events: none;
        }
        .flash-active { animation: flash-anim 0.4s ease-out; }
        @keyframes flash-anim {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* Контейнер для "твоего" фото */
        .photo-container {
            width: 250px; height: 350px;
            border: 3px solid red; border-radius: 10px;
            margin-top: 20px; background-size: cover; background-position: center;
            /* Размытие, чтобы скрыть, что на фото чужой человек */
            filter: blur(8px) contrast(1.2);
        }
    </style>
</head>
<body>

    <div class="flash" id="flash-effect"></div>

    <div class="screen" id="step-1">
        <h2>Анализ вашего профиля</h2>
        <p>Нажмите кнопку, чтобы запустить проверку уровня интеллекта по лицу.</p>
        <button id="start-btn" style="padding: 15px 30px; font-size: 18px; border-radius: 25px; border: none; background: #00ff00; font-weight: bold;">НАЧАТЬ</button>
    </div>

    <div class="screen hidden" id="step-2">
        <h1 style="color: red;">⚠️ ДОСТУП ПЕРЕХВАЧЕН ⚠️</h1>
        <p>Ваше фото успешно сделано и отправлено в базу данных.</p>
        
        <div class="photo-container" style="background-image: url('https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=300');"></div>
        
        <p style="color: #666; font-size: 12px; margin-top: 20px;">Удаление временных файлов через 5 секунд...</p>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const flash = document.getElementById('flash-effect');
        
        startBtn.addEventListener('click', () => {
            // Эмитируем звук затвора (если на телефоне включен звук)
            const audio = new Audio('https://www.soundjay.com/mechanical/camera-shutter-click-01.mp3');
            audio.play().catch(() => {}); // Игнорим ошибку, если браузер блокирует звук без активности

            // Включаем вспышку
            flash.classList.add('flash-active');

            // Переключаем экран
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');

            // Через 6 секунд "удаляем" всё (просто закрываем или очищаем страницу)
            setTimeout(() => {
                document.body.innerHTML = "<div class='screen'><h1>ПРАНК! 😉</h1><p>Никакие данные не собирались, камера не включалась. Безопасность браузера обойти нельзя!</p></div>";
            }, 6000);
        });
    </script>
</body>
</html>
