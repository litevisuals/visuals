<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LITEVISUALS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #09090e; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center;
            align-items: center; 
            padding: 16px;
        }

        /* КАРТОЧКА ФОРМЫ (PulseVisuals стиль) */
        .main-card {
            width: 100%;
            max-width: 380px;
            background: #111116;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .banner {
            width: 100%;
            height: 150px;
            background: linear-gradient(rgba(0,0,0,0.1), #111116), url('https://raw.githubusercontent.com/litevisuals/visuals/main/banner.jpg') center/cover no-repeat;
            background-color: #161622;
            display: flex;
            align-items: flex-end;
            padding: 24px 20px;
        }

        .banner-text {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.4;
            color: #e2e2e8;
        }

        .form-content { padding: 24px 20px 30px; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .form-title { font-size: 22px; font-weight: 700; }
        .close-btn { color: #4e4e5e; cursor: pointer; font-size: 18px; }

        .input-group { position: relative; margin-bottom: 14px; }
        .input-group input {
            width: 100%;
            background: #17171f;
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            padding: 18px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        .input-group input:focus { border-color: #5b57ef; background: #1a1a26; }
        
        /* Защита от желтого фона автозаполнения */
        .input-group input:-webkit-autofill,
        .input-group input:-webkit-autofill:hover, 
        .input-group input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 1000px #17171f inset !important;
            -webkit-text-fill-color: #ffffff !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #5b57ef 0%, #3b37c7 100%);
            color: #ffffff;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(91, 87, 239, 0.25);
            transition: all 0.15s;
            margin-top: 10px;
            margin-bottom: 20px;
        }
        .btn-submit:active { transform: scale(0.98); opacity: 0.95; }

        .footer-links { display: flex; justify-content: space-between; font-size: 13px; }
        .link-secondary { color: #525266; text-decoration: none; cursor: pointer; }
        .link-secondary span { color: #fff; font-weight: 500; }

        /* ОКНО ПОСЛЕ УСПЕШНОГО ВХОДА */
        #client-area { display: none; padding: 30px 20px; text-align: center; }
        .welcome-text { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
        .user-email { font-size: 13px; color: #525266; margin-bottom: 30px; font-family: monospace; }

        #toast { 
            position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); 
            background: #fff; color: #000; padding: 14px 28px; border-radius: 50px; 
            font-size: 13px; font-weight: 700; opacity: 0; z-index: 1000;
            transition: all 0.3s cubic-bezier(0.1, 1, 0.1, 1); pointer-events: none; 
        }
        #toast.show { bottom: 30px; opacity: 1; }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="banner">
            <div class="banner-text">Сделайте каждую игровую сессию по-настоящему комфортной с нашим продуктом</div>
        </div>

        <div id="auth-area" class="form-content">
            <div class="header-row">
                <div class="form-title" id="form-title">Авторизация</div>
                <div class="close-btn">✕</div>
            </div>

            <div class="input-group">
                <input type="email" id="email" placeholder="Войди, чтобы попасть в свой профиль">
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="Пароль">
            </div>

            <button class="btn-submit" id="submit-btn" onclick="handleAuth()">Войти</button>

            <div class="footer-links">
                <div class="link-secondary" id="switch-btn" onclick="toggleMode()">Нет аккаунта? <span>Регистрация</span></div>
                <div class="link-secondary">Забыл пароль</div>
            </div>
        </div>

        <div id="client-area">
            <div class="welcome-text">Доступ получен</div>
            <div class="user-email" id="user-display-email">...</div>
            
            <button class="btn-submit" onclick="copyScript()">Скопировать скрипт</button>

        </div>
    </div>

    <div id="toast">Готово</div>
