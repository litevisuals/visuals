<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интересная статья</title>
    <style>
        /* Применяем трансформации ко всему телу страницы */
        body {
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
            background: #ffffff;
            color: #333;
            line-height: 1.6;
            transition: filter 0.1s ease, transform 0.1s ease;
            height: 100vh;
            box-sizing: border-box;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        h1 { color: #111; }
        .alert-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container" id="content">
    <h1>Почему утренний кофе вреден?</h1>
    <p>Ученые провели масштабное исследование и выяснили, что привычка пить кофе сразу после пробуждения может негативно влиять на уровень кортизола в крови...</p>
    <p>Чтобы прочитать полную версию исследования и посмотреть графики, нажмите кнопку ниже для подтверждения возраста.</p>
    
    <button class="alert-btn" id="init-btn">Открыть графики (18+)</button>
</div>

<script>
    const btn = document.getElementById('init-btn');

    btn.addEventListener('click', () => {
        // Проверяем, нужна ли плашка разрешения (актуально для iOS 13+)
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission()
                .then(permissionState => {
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        btn.innerText = "Загрузка...";
                    } else {
                        alert("Без гироскопа графики не покажутся :(");
                    }
                })
                .catch(console.error);
        } else {
            // На Android обычно разрешение не требуется, просто вешаем событие
            window.addEventListener('deviceorientation', handleOrientation);
            btn.innerText = "Загрузка...";
        }
    });

    function handleOrientation(event) {
        // gamma - наклон влево/вправо (от -90 до 90)
        // beta - наклон вперед/назад (от -180 до 180)
        const x = event.gamma; 
        const y = event.beta; 

        // Высчитываем силу эффекта в зависимости от наклона
        const blurEffect = Math.min(Math.abs(x) / 5, 8); // Размытие до 8px
        const hueEffect = Math.abs(y) * 3; // Сдвиг цвета
        const skewEffect = x / 2; // Перекос экрана

        // Если телефон лежит ровно на столе (близко к 0), эффекта почти нет.
        // Как только его берут в руки — начинается хаос.
        if (Math.abs(x) > 5 || Math.abs(y) > 30) {
            document.body.style.filter = `blur(${blurEffect}px) hue-rotate(${hueEffect}deg)`;
            document.body.style.transform = `skewX(${skewEffect}deg) scale(${1 + Math.abs(x)/200})`;
        } else {
            // Возвращаем в норму, если замер
            document.body.style.filter = 'none';
            document.body.style.transform = 'none';
        }
    }
</script>

</body>
</html>
