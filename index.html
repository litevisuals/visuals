<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест батареи</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .hidden { display: none; }
        .battery-icon { width: 100px; height: 50px; border: 4px solid #fff; border-radius: 5px; position: relative; margin: 20px auto; }
        .battery-level { height: 100%; background: #ff3333; width: 100%; transition: width 1s; }
    </style>
</head>
<body>

    <div id="intro">
        <h2>Идет калибровка аккумулятора...</h2>
        <p id="real-battery">Считывание данных датчика...</p>
        <button id="start-btn" style="padding: 10px 20px; font-size: 16px;">Запустить тест</button>
    </div>

    <div id="prank" class="hidden">
        <h1 style="color: #ff3333;">⚠️ КРИТИЧЕСКИЙ СБОЙ ПИТАНИЯ</h1>
        <div class="battery-icon"><div id="level" class="battery-level"></div></div>
        <h2 id="countdown">Заряд: 1%</h2>
        <p>Завершение работы Android / iOS через 5 секунд...</p>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        let currentBattery = 100;

        // Запрашиваем реальный заряд батареи у браузера
        if (navigator.getBattery) {
            navigator.getBattery().then(function(battery) {
                currentBattery = Math.floor(battery.level * 100);
                document.getElementById('real-battery').innerText = `Ваш текущий заряд: ${currentBattery}%`;
            });
        }

        startBtn.addEventListener('click', () => {
            document.getElementById('intro').classList.add('hidden');
            document.getElementById('prank').classList.remove('hidden');
            
            const levelBar = document.getElementById('level');
            // Резко сбрасываем полоску заряда до минимума
            setTimeout(() => { levelBar.style.width = '1%'; }, 100);

            let seconds = 5;
            const timer = setInterval(() => {
                seconds--;
                if (seconds <= 0) {
                    clearInterval(timer);
                    // Вместо выключения показываем развязку
                    document.body.innerHTML = "<h1 style='color:#00ff00'>ПРАНК! 😂</h1><p>Твой телефон в порядке, зарядка по-прежнему на уровне " + currentBattery + "%!</p>";
                } else {
                    document.getElementById('countdown').innerText = `Заряд: 1% (Выключение через ${seconds} сек)`;
                }
            }, 1000);
        });
    </script>
</body>
</html>
