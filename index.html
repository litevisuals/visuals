<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LITEVISUALS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #09090e; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center;
            align-items: center; 
            padding: 16px;
        }

        /* ЧИСТАЯ ПРЕМbackground КАРТОЧКА */
        .main-card {
            width: 100%;
            max-width: 360px;
            background: #111116;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 24px;
            padding: 30px 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        }

        .header-row { 
            text-align: center;
            margin-bottom: 32px; 
        }

        .form-title { 
            font-size: 26px; 
            font-weight: 800; 
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 0%, #a0a0ab 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Инпуты */
        .input-group { margin-bottom: 16px; }
        .input-group input {
            width: 100%;
            background: #17171f;
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            padding: 18px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        .input-group input:focus { border-color: #5b57ef; background: #1a1a26; }
        
        /* Фикс автозаполнения */
        .input-group input:-webkit-autofill,
        .input-group input:-webkit-autofill:hover, 
        .input-group input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 1000px #17171f inset !important;
            -webkit-text-fill-color: #ffffff !important;
        }

        /* БЛОК КНОПОК */
        .buttons-holder {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-main {
            width: 100%;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }

        /* Кнопка Войти (Фиолетовый Град) */
        .btn-login {
            background: linear-gradient(135deg, #5b57ef 0%, #3b37c7 100%);
            color: #ffffff;
            box-shadow: 0 6px 20px rgba(91, 87, 239, 0.25);
        }
        .btn-login:active { transform: scale(0.98); opacity: 0.95; }

        /* Кнопка Регистрации (Матовая Темная) */
        .btn-register {
            background: #1c1c24;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .btn-register:active { transform: scale(0.98); background: #23232d; }

        /* ИНТЕРФЕЙС ПОСЛЕ ВХОДА */
        #client-area { display: none; text-align: center; }
        .welcome-text { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
        .user-email { font-size: 13px; color: #525266; margin-bottom: 30px; font-family: monospace; }

        #toast { 
            position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); 
            background: #fff; color: #000; padding: 14px 28px; border-radius: 50px; 
            font-size: 13px; font-weight: 700; opacity: 0; z-index: 1000;
            transition: all 0.3s cubic-bezier(0.1, 1, 0.1, 1); pointer-events: none; 
            white-space: nowrap;
        }
        #toast.show { bottom: 30px; opacity: 1; }
    </style>
</head>
<body>

    <div class="main-card">
        <div id="auth-area">
            <div class="header-row">
                <div class="form-title">Litevisuals</div>
            </div>

            <div class="input-group">
                <input type="email" id="email" placeholder="Введите ваш Email">
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="Введите пароль">
            </div>

            <div class="buttons-holder">
                <button class="btn-main btn-login" onclick="login()">Войти в аккаунт</button>
                <button class="btn-main btn-register" onclick="register()">Создать аккаунт</button>
            </div>
        </div>

        <div id="client-area">
            <div class="welcome-text">Доступ получен</div>
            <div class="user-email" id="user-display-email">...</div>
            
            <button class="btn-main btn-login" onclick="copyScript()">Скопировать скрипт</button>
            <button class="btn-main btn-register" style="margin-top: 12px; background: rgba(255,255,255,0.02); color:#62627a;" onclick="logout()">Выйти</button>
        </div>
    </div>

    <div id="toast">Готово</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://ycvvuszmrydfuyuaavpk.supabase.co";
        // Замени строчку ниже на свой anon public ключ из настроек Supabase (скриншот 1783066045309.jpeg)
        const SUPABASE_ANON_KEY = "СЮДА_ВСТАВЬ_КЛЮЧ"; 

        let supabase;
        try {
            supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch(e) {
            console.error("Ошибка базы данных");
        }

        window.onload = async () => {
            if (supabase) {
                const { data: { session } } = await supabase.auth.getSession();
                if (session) showCabinet(session.user.email);
            }
        };

        // Функция Входа
        async function login() {
            const { email, password } = getInputs();
            if(!email || !password) return showToast("Заполните все поля");
            if(!supabase) return showToast("Ошибка подключения к серверу");

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if(error) showToast("Неверный логин или пароль");
            else showCabinet(data.user.email);
        }

        // Функция Регистрации
        async function register() {
            const { email, password } = getInputs();
            if(!email || !password) return showToast("Заполните все поля");
            if(password.length < 6) return showToast("Пароль должен быть от 6 символов");
            if(!supabase) return showToast("Ошибка подключения к серверу");

            const { data, error } = await supabase.auth.signUp({ email, password });
            if(error) {
                showToast(error.message);
            } else {
                showToast("Аккаунт создан! Проверьте почту");
            }
        }

        function getInputs() {
            return {
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value.trim()
            }
        }

        function showCabinet(email) {
            document.getElementById('auth-area').style.display = 'none';
            document.getElementById('client-area').style.display = 'block';
            document.getElementById('user-display-email').innerText = email;
        }

        async function logout() {
            if (supabase) await supabase.auth.signOut();
            location.reload();
        }

        function copyScript() {
            if (navigator.vibrate) navigator.vibrate(15);
            const code = "loadstring(game:HttpGet('https://raw.githubusercontent.com/litevisuals/visuals/main/Lite_Pc.lua'))()";
            navigator.clipboard.writeText(code).then(() => { showToast("Скрипт скопирован!"); });
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
