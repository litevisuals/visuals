<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LITEVISUALS TERMINAL</title>
    <style>
        :root {
            --bg-color: #030305;
            --accent-glow: rgba(0, 242, 254, 0.15);
            --border-color: rgba(255, 255, 255, 0.08);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 50% 15%, rgba(0, 242, 254, 0.12), transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 0, 128, 0.05), transparent 40%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform: translateY(0);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo-area {
            margin-bottom: 35px;
        }
        h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .subtitle {
            font-size: 14px;
            color: #6366f1;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px;
            margin-bottom: 16px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            border: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            color: #000;
            box-shadow: 0 4px 20px rgba(0, 242, 254, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0, 242, 254, 0.45);
        }
        .btn-primary:active { transform: translateY(0); }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .footer-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 25px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-area">
        <h1>LITEVISUALS</h1>
        <div class="subtitle">Premium Execution</div>
    </div>
    
    <!-- Главная кнопка -->
    <button class="btn btn-primary" onclick="copyScript()">Скопировать скрипт</button>
    
    <!-- Кнопка в ТГ -->
    <a href="https://t.me/LITEVISUALS_OFFCIAL" target="_blank" class="btn btn-secondary">Telegram Канал</a>
    
    <div class="footer-text">Нажмите кнопку выше, чтобы скопировать лоадстринг</div>
</div>

<script>
function copyScript() {
    const luaCode = "loadstring(game:HttpGet('https://raw.githubusercontent.com/litevisuals/visuals/main/Lite_Pc.lua'))()";
    
    navigator.clipboard.writeText(luaCode).then(() => {
        alert("Скрипт успешно скопирован в буфер обмена!");
    }).catch(err => {
        alert("Ошибка. Скопируй вручную из консоли браузера.");
        console.log(luaCode);
    });
}
</script>

</body>
</html>
